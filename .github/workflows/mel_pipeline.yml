name: MEL Automated Pipeline

on:
  schedule:
    - cron: "0 6 * * 1"    # Chaque lundi à 6h (weekly data pull)
    - cron: "0 8 1 * *"    # 1er de chaque mois (monthly report)
  push:
    branches: [main]
  workflow_dispatch:        # Déclenchement manuel

jobs:
  run-mel-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directories
        run: mkdir -p data/processed data/reports

      - name: Calculate indicators
        run: |
          python -c "
          import pandas as pd
          import numpy as np
          np.random.seed(42)
          n = 500
          df = pd.DataFrame({
              'OUT_001': np.random.choice([1,0], n, p=[0.85,0.15]),
              'OUT_002': np.random.randint(1,5,n),
              'OUT_003': np.random.choice([1,0], n, p=[0.70,0.30]),
              'OUTC_001': np.random.choice([1,0], n, p=[0.65,0.35]),
              'OUTC_002': np.random.choice([1,0], n, p=[0.60,0.40]),
          })
          df.to_csv('data/processed/collected_data.csv', index=False)
          print('✅ Mock data generated')
          "

      - name: Run indicator engine
        run: |
          python -m src.indicators.calculator \
            --config config/indicators_config.yaml \
            --data data/processed/collected_data.csv \
            --output data/reports/indicator_report.csv

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: mel-report-${{ github.run_number }}
          path: data/reports/
          retention-days: 90

  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short